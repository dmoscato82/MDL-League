function escapeHtml(value) {
  return String(value === null || value === undefined ? '' : value).replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  }[c]));
}
function fmtMoney(n) {
  if (n === null || n === undefined || Number.isNaN(n)) return '—';
  return '$' + Number(n).toLocaleString('en-US', { maximumFractionDigits: 0 });
}
function fmtMoneySigned(n) {
  if (n === null || n === undefined || Number.isNaN(n)) return '—';
  const sign = n < 0 ? '-' : '';
  return sign + '$' + Math.abs(Number(n)).toLocaleString('en-US', { maximumFractionDigits: 0 });
}
document.getElementById('generatedAt').textContent = 'Generated ' + new Date(DATA.generatedAt).toLocaleString();
document.querySelectorAll('.tab-btn').forEach((btn) => btn.addEventListener('click', () => {
  document.querySelectorAll('.tab-btn').forEach((b) => b.classList.toggle('active', b === btn));
  document.querySelectorAll('.tab-panel').forEach((p) => p.classList.toggle('active', p.id === 'tab-' + btn.dataset.tab));
}));

function renderRosters() {
  const container = document.getElementById('rostersContainer');
  container.innerHTML = '';
  const select = document.createElement('select');
  DATA.teams.forEach((t) => {
    const opt = document.createElement('option');
    opt.value = t.team_owner;
    opt.textContent = t.team_owner + ' — ' + t.team_nickname;
    select.appendChild(opt);
  });
  select.addEventListener('change', () => renderRosterTable(select.value));
  container.appendChild(select);
  const wrap = document.createElement('div');
  wrap.id = 'rosterTableWrap';
  container.appendChild(wrap);
  if (DATA.teams.length) renderRosterTable(DATA.teams[0].team_owner);
}
const POSITION_ORDER = ['QB', 'RB', 'WR', 'TE', 'D/ST', 'K'];
function capDisplayValue(v) {
  if (v === null || v === undefined) return '';
  return typeof v === 'number' ? fmtMoney(v) : v;
}
function sumCap(players, field) {
  return players.reduce((sum, p) => sum + (typeof p[field] === 'number' ? p[field] : 0), 0);
}
function capSortValue(v) {
  return typeof v === 'number' ? v : -Infinity;
}
function renderRosterTable(teamOwner) {
  const players = DATA.players
    .filter((p) => p.fantasy_team === teamOwner)
    .sort((a, b) => (a.position + a.player_name).localeCompare(b.position + b.player_name));
  const wrap = document.getElementById('rosterTableWrap');
  const table = document.createElement('table');
  table.innerHTML = '<thead><tr><th>Player</th><th>NFL Team</th><th>2026 Cap</th><th>2027 Cap</th><th>2028 Cap</th></tr></thead>';
  const tbody = document.createElement('tbody');

  const positions = [...new Set(players.map((p) => p.position))].sort((a, b) => {
    const ai = POSITION_ORDER.indexOf(a);
    const bi = POSITION_ORDER.indexOf(b);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });

  positions.forEach((pos) => {
    const group = players
      .filter((p) => p.position === pos)
      .sort((a, b) => capSortValue(b.cap_hit_2026) - capSortValue(a.cap_hit_2026));
    const headerTr = document.createElement('tr');
    headerTr.className = 'position-group-header';
    headerTr.innerHTML = '<td colspan="5">' + escapeHtml(pos) + '</td>';
    tbody.appendChild(headerTr);

    group.forEach((p) => {
      const tr = document.createElement('tr');
      tr.innerHTML = '<td>' + escapeHtml(p.player_name) + '</td>' +
        '<td>' + escapeHtml(p.nfl_team) + '</td>' +
        '<td>' + escapeHtml(capDisplayValue(p.cap_hit_2026)) + '</td>' +
        '<td>' + escapeHtml(capDisplayValue(p.cap_hit_2027)) + '</td>' +
        '<td>' + escapeHtml(capDisplayValue(p.cap_hit_2028)) + '</td>';
      tbody.appendChild(tr);
    });

    const subtotalTr = document.createElement('tr');
    subtotalTr.className = 'subtotal-row';
    subtotalTr.innerHTML = '<td colspan="2">' + escapeHtml(pos) + ' Subtotal</td>' +
      '<td>' + fmtMoney(sumCap(group, 'cap_hit_2026')) + '</td>' +
      '<td>' + fmtMoney(sumCap(group, 'cap_hit_2027')) + '</td>' +
      '<td>' + fmtMoney(sumCap(group, 'cap_hit_2028')) + '</td>';
    tbody.appendChild(subtotalTr);
  });

  const total2026 = sumCap(players, 'cap_hit_2026');
  const totalTr = document.createElement('tr');
  totalTr.className = 'total-row';
  totalTr.innerHTML = '<td colspan="2">TOTAL</td>' +
    '<td>' + fmtMoney(total2026) + '</td>' +
    '<td>' + fmtMoney(sumCap(players, 'cap_hit_2027')) + '</td>' +
    '<td>' + fmtMoney(sumCap(players, 'cap_hit_2028')) + '</td>';
  tbody.appendChild(totalTr);

  const capLimitTr = document.createElement('tr');
  capLimitTr.className = 'cap-limit-row';
  capLimitTr.innerHTML = '<td colspan="2">2026 Salary Cap Limit</td>' +
    '<td>' + fmtMoney(DATA.leagueRules.salary_cap) + '</td><td>—</td><td>—</td>';
  tbody.appendChild(capLimitTr);

  const room2026 = DATA.leagueRules.salary_cap - total2026;
  const capRoomTr = document.createElement('tr');
  capRoomTr.className = 'cap-room-row ' + (room2026 >= 0 ? 'cap-room-positive' : 'cap-room-negative');
  capRoomTr.innerHTML = '<td colspan="2">' + (room2026 >= 0 ? 'Room Under Cap' : 'Over Cap') + ' (2026)</td>' +
    '<td>' + fmtMoneySigned(room2026) + '</td><td>—</td><td>—</td>';
  tbody.appendChild(capRoomTr);

  table.appendChild(tbody);
  wrap.innerHTML = '';
  wrap.appendChild(table);
}

function capStanding(total2026, rules) {
  if (total2026 > rules.salary_cap || total2026 < rules.salary_floor) return 'Bad Standing';
  if (total2026 >= rules.good_range_min && total2026 <= rules.good_range_max) return 'Good Standing';
  return 'Warning';
}
function standingClass(standing) {
  return { 'Good Standing': 'standing-good', Warning: 'standing-warning', 'Bad Standing': 'standing-bad' }[standing];
}

function renderCapSummary() {
  const rules = DATA.leagueRules;
  const totals = {};
  DATA.players.forEach((p) => {
    const t = totals[p.fantasy_team] || (totals[p.fantasy_team] = { total_2026: 0 });
    if (typeof p.cap_hit_2026 === 'number') t.total_2026 += p.cap_hit_2026;
  });
  const wrap = document.getElementById('capSummaryContainer');
  wrap.innerHTML = '<p>Salary Cap: <strong>' + fmtMoney(rules.salary_cap) + '</strong> · Salary Floor: <strong>' + fmtMoney(rules.salary_floor) +
    '</strong> · Good Range: <strong>' + fmtMoney(rules.good_range_min) + ' – ' + fmtMoney(rules.good_range_max) + '</strong></p>';
  const table = document.createElement('table');
  table.innerHTML = '<thead><tr><th>Team</th><th>2026 Cap Used</th><th>Cap Space</th><th>2026 Status</th></tr></thead>';
  const tbody = document.createElement('tbody');
  Object.keys(totals).sort().forEach((team) => {
    const r = totals[team];
    const capSpace = rules.salary_cap - r.total_2026;
    const standing = capStanding(r.total_2026, rules);
    const tr = document.createElement('tr');
    tr.innerHTML = '<td>' + escapeHtml(team) + '</td><td>' + fmtMoney(r.total_2026) + '</td>' +
      '<td class="' + (capSpace >= 0 ? 'cap-room-positive' : 'cap-room-negative') + '">' + fmtMoneySigned(capSpace) + '</td>' +
      '<td class="' + standingClass(standing) + '">' + standing + '</td>';
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  wrap.appendChild(table);
}

function renderTrades() {
  const wrap = document.getElementById('tradesListContainer');
  wrap.innerHTML = '';
  DATA.trades.forEach((t) => {
    const div = document.createElement('div');
    div.className = 'trade-card';
    div.innerHTML = '<div class="trade-header">' + escapeHtml(t.trade_date) + ' — ' + escapeHtml(t.team_a) + ' ↔ ' + escapeHtml(t.team_b) + '</div>' +
      '<div><strong>' + escapeHtml(t.team_a) + ' receives:</strong> ' + (t.assetsA.map(escapeHtml).join(', ') || '—') + '</div>' +
      '<div><strong>' + escapeHtml(t.team_b) + ' receives:</strong> ' + (t.assetsB.map(escapeHtml).join(', ') || '—') + '</div>' +
      (t.notes.length ? '<div class="trade-notes">' + t.notes.map(escapeHtml).join('<br>') + '</div>' : '');
    wrap.appendChild(div);
  });
}

function renderDraftPicks() {
  const wrap = document.getElementById('draftPicksContainer');
  wrap.innerHTML = '';

  const conditional = DATA.draftPicks.filter((p) => p.condition_text);
  const conditionalBox = document.createElement('div');
  conditionalBox.id = 'openConditionalPicks';
  conditionalBox.innerHTML = '<h3>Open Conditional Picks</h3>';
  if (conditional.length) {
    const table = document.createElement('table');
    table.innerHTML = '<thead><tr><th>Year</th><th>Round</th><th>Current Owner</th><th>Condition</th></tr></thead>';
    const tbody = document.createElement('tbody');
    conditional.forEach((p) => {
      const tr = document.createElement('tr');
      tr.innerHTML = '<td>' + escapeHtml(p.year) + '</td><td>' + escapeHtml(p.round) + '</td><td>' + escapeHtml(p.current_owner) + '</td><td>' + escapeHtml(p.condition_text) + '</td>';
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    conditionalBox.appendChild(table);
  } else {
    conditionalBox.innerHTML += '<p>No open conditional picks.</p>';
  }
  wrap.appendChild(conditionalBox);

  DATA.teams.forEach((team) => {
    const group = DATA.draftPicks.filter((p) => p.current_owner === team.team_owner);
    if (!group.length) return;
    const heading = document.createElement('h3');
    heading.textContent = team.team_owner + ' — ' + team.team_nickname;
    wrap.appendChild(heading);
    const table = document.createElement('table');
    table.innerHTML = '<thead><tr><th>Year</th><th>Round</th><th>Original Team</th></tr></thead>';
    const tbody = document.createElement('tbody');
    group.forEach((p) => {
      const tr = document.createElement('tr');
      tr.innerHTML = '<td>' + escapeHtml(p.year) + '</td><td>' + escapeHtml(p.round) + '</td><td>' + escapeHtml(p.note) + '</td>';
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    wrap.appendChild(table);
  });
}

renderRosters();
renderCapSummary();
renderTrades();
renderDraftPicks();

</script>
